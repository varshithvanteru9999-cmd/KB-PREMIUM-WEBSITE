<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | KB Beauty Salons & Tattoos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0d0a02;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(180,130,40,0.14) 0%, transparent 55%),
                radial-gradient(ellipse at 70% 80%, rgba(100,70,10,0.10) 0%, transparent 55%);
            z-index: 0;
            pointer-events: none;
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(22,16,3,0.92);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212,175,55,0.30);
            padding: 3rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow:
                0 40px 80px rgba(0,0,0,0.7),
                0 0 60px rgba(212,175,55,0.06),
                inset 0 1px 0 rgba(212,175,55,0.10);
            animation: slideUp 0.6s cubic-bezier(0.23,1,0.32,1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 12px rgba(212,175,55,0.35));
        }

        .login-header p {
            color: #9a7840;
            font-size: 0.82rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-top: 0.3rem;
        }

        .admin-badge {
            display: inline-block;
            background: rgba(212,175,55,0.10);
            border: 1px solid rgba(212,175,55,0.25);
            color: #d4af37;
            font-size: 0.70rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            margin-top: 0.5rem;
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-group label {
            display: block;
            color: #d4af37;
            margin-bottom: 0.5rem;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(13,10,2,0.85);
            border: 1px solid rgba(180,130,40,0.25);
            border-radius: 8px;
            color: #e8d5a0;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            -webkit-text-fill-color: #e8d5a0;
        }

        input::placeholder { color: #9a7840; -webkit-text-fill-color: #9a7840; opacity: 1; }

        input:focus {
            outline: none;
            border-color: #d4af37;
            background: rgba(22,16,3,0.95);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.10);
            -webkit-text-fill-color: #e8d5a0;
        }

        /* Override browser autofill cream background */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px #0d0a02 inset !important;
            -webkit-text-fill-color: #e8d5a0 !important;
            caret-color: #e8d5a0;
            transition: background-color 5000s ease-in-out 0s;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(
                135deg,
                #2a1f00 0%, #7a5c10 12%, #bf953f 28%,
                #fcf6ba 45%, #d4af37 55%, #b38728 68%,
                #fcf6ba 78%, #bf953f 88%, #7a5c10 95%, #2a1f00 100%
            );
            color: #1a1000;
            border: none;
            padding: 1.1rem;
            border-radius: 6px;
            font-weight: 900;
            font-size: 0.95rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            box-shadow:
                inset 0 2px 2px rgba(255,255,255,0.65),
                inset 0 -2px 2px rgba(0,0,0,0.5),
                0 4px 0 #3d2b00,
                0 7px 18px rgba(0,0,0,0.7);
            text-shadow:
                0.5px 0.5px 1px rgba(255,245,190,0.55),
                -0.5px -0.5px 1px rgba(0,0,0,0.95),
                0 0 4px rgba(0,0,0,0.6);
            -webkit-text-fill-color: #1a1000;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(110deg, rgba(255,250,200,0) 0%, rgba(255,255,255,0.7) 50%, rgba(255,250,200,0) 100%);
            transition: left 0.6s ease;
        }

        .btn-login:hover {
            transform: translateY(3px);
            box-shadow:
                inset 0 2px 2px rgba(255,255,255,0.65),
                0 1px 0 #3d2b00,
                0 4px 15px rgba(212,175,55,0.35);
        }
        .btn-login:hover::before { left: 100%; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <img src="/images/kb logo.png" alt="KB Beauty" class="login-logo">
            <p>KB Beauty Salons</p>
            <span class="admin-badge">Admin Access</span>
        </div>
        <div class="form-group">
            <label for="identifier">Email or Mobile Number</label>
            <input type="text" id="identifier" placeholder="Enter admin email or mobile number">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn-login" onclick="handleLogin()">Sign In</button>
    </div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .swal2-popup { background: rgba(22,16,3,0.98) !important; border: 1px solid rgba(212,175,55,0.25) !important; border-radius: 1.2rem !important; font-family: 'Outfit', sans-serif !important; color: #e8d5a0 !important; box-shadow: 0 24px 60px rgba(0,0,0,0.7) !important; }
        .swal2-popup.swal2-toast { padding: 0.9rem 1.4rem !important; border-radius: 10px !important; background: rgba(22,16,3,0.98) !important; }
        .swal2-title { color: #e8d5a0 !important; font-size: 0.9rem !important; font-family: 'Outfit', sans-serif !important; font-weight: 700 !important; }
        .swal2-icon.swal2-error   { border-color: rgba(224,112,96,0.35) !important; color: #e07060 !important; }
        .swal2-icon.swal2-success { border-color: rgba(212,175,55,0.4) !important; color: #d4af37 !important; }
        .swal2-icon.swal2-warning { border-color: rgba(212,175,55,0.4) !important; color: #d4af37 !important; }
        .swal2-timer-progress-bar { background: rgba(212,175,55,0.45) !important; }
    </style>
    <script>
        const _loginToast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3500, timerProgressBar: true });
        function showMsg(msg, icon = 'error') { _loginToast.fire({ icon, title: msg }); }

        async function handleLogin() {
            const identifier = document.getElementById('identifier').value.trim();
            const password   = document.getElementById('password').value;
            const btn        = document.querySelector('.btn-login');

            if (!identifier || !password) { showMsg('Please enter all fields.', 'warning'); return; }

            btn.disabled = true;
            btn.innerText = 'Verifying...';

            try {
                const res  = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });
                const data = await res.json();

                if (data.success) {
                    if (data.role !== 'admin') {
                        showMsg('Access denied. Admin credentials required.', 'error');
                        return;
                    }
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.user));
                    showMsg('Welcome back! Redirecting…', 'success');
                    setTimeout(() => { location.href = '/admin.html'; }, 800);
                } else {
                    showMsg(data.error || 'Invalid credentials.', 'error');
                }
            } catch (err) {
                showMsg('Connection error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Sign In';
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    </script>
</body>
</html>
